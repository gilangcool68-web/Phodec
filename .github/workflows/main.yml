name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev cmake python3-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk-headless
        pip install --upgrade pip
        pip install "buildozer==1.5.0" "cython<3.0.0" requests

    - name: Link SDK to Buildozer
      run: |
        # 1. Buat folder yang dicari Buildozer
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk
        
        # 2. Paksa Buildozer memakai SDK yang sudah terinstall di GitHub Runner
        # Ini adalah trik agar Buildozer tidak mencoba download SDK sendiri
        export ANDROID_HOME=/usr/local/lib/android/sdk
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        
        # 3. Buat symlink agar Buildozer "mengira" SDK-nya ada di sana
        ln -s $ANDROID_HOME /home/runner/.buildozer/android/platform/android-sdk/platforms
        ln -s $ANDROID_HOME/cmdline-tools /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools

    - name: Build with Buildozer
      run: |
        # Eksekusi build
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-APK
        path: bin/*.apk
