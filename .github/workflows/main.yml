name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev cmake python3-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk-headless
        pip install --upgrade pip
        
        # INI KUNCINYA: Kita install Buildozer langsung dari GitHub mereka (versi Master).
        # Ini menyingkirkan bug "tools/bin/sdkmanager" yang ada di versi 1.5.0.
        pip install git+https://github.com/kivy/buildozer.git "cython<3.0.0" requests

    - name: Build with Buildozer
      run: |
        # Perintah 'yes' di depan buat antisipasi kalau Buildozer minta persetujuan lisensi mendadak
        yes | buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-APK
        path: bin/*.apk
