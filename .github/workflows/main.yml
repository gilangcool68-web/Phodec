name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev cmake python3-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk-headless
        pip install --upgrade pip setuptools wheel
        pip install git+https://github.com/kivy/buildozer.git "cython==0.29.37"

    - name: Build
      run: |
        # Paksa buildozer menggunakan python3.11 yang sudah terinstal di environment
        export PATH=$PATH:/opt/hostedtoolcache/Python/3.11.15/x64/bin
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-APK
        path: bin/*.apk
