name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev cmake python3-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk-headless
        pip install --upgrade pip
        pip install "buildozer==1.5.0" "cython<3.0.0" requests

    - name: Build with Buildozer
      env:
        # INI KUNCINYA: Paksa Buildozer ngeliat SDK sistem, bukan download sendiri
        ANDROID_HOME: /usr/local/lib/android/sdk
        ANDROID_SDK_HOME: /usr/local/lib/android/sdk
      run: |
        # Lewatin pengecekan otomatis buildozer dengan ngasih tahu path SDK yang valid
        # Kita juga set API-nya di sini biar gak nanya-nanya lagi
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-APK
        path: bin/*.apk
