name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev cmake python3-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk-headless
        pip install --upgrade pip
        pip install "buildozer==1.5.0" "cython<3.0.0" requests

    - name: Fix SDK Path (Jembatan Manual)
      run: |
        # Buat struktur folder yang dicari Buildozer
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
        
        # Buat symlink biar Buildozer nemu sdkmanager di tempat yang dia mau
        ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        
        # Pastikan lisensi ada (Suntikan langsung ke folder yang dicari)
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
        cp -r $ANDROID_HOME/licenses/* /home/runner/.buildozer/android/platform/android-sdk/licenses/ || true

    - name: Build with Buildozer
      run: |
        # Buildozer akan jalan dengan percaya diri karena foldernya sudah ada
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-APK
        path: bin/*.apk
