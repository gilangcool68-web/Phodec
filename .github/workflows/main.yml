name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev cmake python3-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk-headless
        
        # PAKSA UPDATE PIP DAN RESOLVELIB DI SISTEM HOST
        pip install --upgrade pip setuptools wheel
        pip install "resolvelib<1.0.0"
        
        # Install Buildozer
        pip install git+https://github.com/kivy/buildozer.git "cython<3.0.0" requests

    - name: Clean build caches
      run: |
        echo "Cleaning build caches..."
        rm -rf .buildozer || true
        rm -rf ~/.buildozer || true
        rm -rf ~/.local/share/python-for-android || true

    - name: Pre-build P4A Virtualenv Hack (THE FIX)
      # INI JURUS PAMUNGKASNYA. Kita paksa bikin virtual environment internal buildozer duluan
      # lalu kita paksa update pip-nya sebelum buildozer jalan secara otomatis.
      run: |
        mkdir -p ~/.local/share/python-for-android/venv
        python -m venv ~/.local/share/python-for-android/venv
        ~/.local/share/python-for-android/venv/bin/pip install --upgrade pip setuptools "resolvelib<1.0.0"

    - name: Build with Buildozer
      run: |
        # Jalan murni
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-APK
        path: bin/*.apk
