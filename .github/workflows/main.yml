name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev cmake python3-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk-headless
        pip install --upgrade pip setuptools wheel
        pip install git+https://github.com/kivy/buildozer.git "cython==0.29.37"

    - name: Accept SDK Licenses
      run: |
        # Memaksa persetujuan lisensi SDK Android secara otomatis
        mkdir -p "$ANDROID_HOME/licenses" || true
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_HOME/licenses/android-sdk-license"
        echo "d56f5187478351656209559e74677762635905d5" > "$ANDROID_HOME/licenses/android-sdk-preview-license"

    - name: Build with Buildozer
      run: |
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-APK
        path: bin/*.apk
