name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Prepare Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev cmake python3-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk-headless
        
        # Buat Virtual Environment yang sangat bersih
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer requests

    - name: Build
      run: |
        source venv/bin/activate
        # Kita set environment variable langsung ke jalur venv agar p4a tidak bingung
        export PATH=$PATH:$PWD/venv/bin
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-APK
        path: bin/*.apk
