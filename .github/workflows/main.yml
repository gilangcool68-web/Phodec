name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev cmake python3-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk-headless
        pip install --upgrade pip
        pip install "buildozer==1.5.0" "cython<3.0.0" requests

    - name: Pre-install SDK and Accept Licenses
      run: |
        # 1. Bikin folder lisensi manual
        mkdir -p /home/runner/.android
        touch /home/runner/.android/repositories.cfg
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses/
        
        # 2. Paksa terima lisensi dari sistem Android SDK
        # Kita echo-kan lisensi ke dalam file agar SDK manager menganggap sudah disetujui
        echo "8933bad161af4178b1185d1a37fbf41ea5261c55" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "d56f5187473751e9f906f34806a616238b1f7d54" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "24333f1a63b68bfa3d3d30bc3db847a28e05e115" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

    - name: Build with Buildozer
      run: |
        # Buildozer biasanya mencoba mengunduh sendiri, 
        # dengan lisensi yang sudah kita suntik di atas, dia harusnya lancar.
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-APK
        path: bin/*.apk
